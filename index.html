<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Declaração Online</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">

        <div class="logo">
            <h1>DECLARAÇÃO ONLINE</h1>
            <p>Gerador Profissional</p>
        </div>

        <div class="input-group">
            <label>Nome Completo</label>

            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="input-group">
            <label>Texto da Declaração</label>

            <textarea id="texto" placeholder="Digite a declaração"></textarea>
        </div>

        <button onclick="gerarDeclaracao()">
            Gerar Declaração
        </button>

        <div id="resultado"></div>

        <div class="footer">
            Sistema Profissional © 2026
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
